<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News — BT Baseball Pool 2026</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/web/assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">Levinsons <small>BT Baseball Pool 2026</small></div>
      <nav class="tabs">
        <a href="/">Team</a>
        <a href="/yesterday">Yesterday</a>
        <a href="/news">News</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <h1 class="page-title">News Feed</h1>
    <p class="page-sub" id="page-sub">Synthesized player-level headlines from the last 24 hours</p>

    <div id="injuries-section" class="section">
      <h2>Injury Report</h2>
      <p class="section-sub">Active injury statuses across the roster, with latest updates.</p>
      <div id="injuries-list"><div class="loader">Loading…</div></div>
    </div>

    <div id="players-section" class="section">
      <h2>Player Updates</h2>
      <p class="section-sub">One update per roster player, sorted alphabetically.</p>
      <div id="players-list" class="news-grid"><div class="loader">Loading…</div></div>
    </div>
  </main>

  <script src="/web/assets/shared.js"></script>
  <script src="/web/assets/news.js"></script>
</body>
</html>
