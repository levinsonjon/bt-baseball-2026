<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yesterday — BT Baseball Pool 2026</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/web/assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">Levinsons <small>BT Baseball Pool 2026</small></div>
      <nav class="tabs">
        <a href="/">Team</a>
        <a href="/yesterday">Yesterday</a>
        <a href="/news">News</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <h1 class="page-title" id="page-title">Yesterday</h1>
    <p class="page-sub" id="page-sub">Previous day's game stats for every player on the roster</p>

    <div id="hitters-section" class="section">
      <h2>Position Players</h2>
      <div class="table-wrap">
        <table class="data" id="hitters-table"><tbody><tr><td class="loader">Loading…</td></tr></tbody></table>
      </div>
    </div>

    <div id="sp-section" class="section">
      <h2>Starting Pitchers</h2>
      <div class="table-wrap">
        <table class="data" id="sp-table"><tbody><tr><td class="loader">Loading…</td></tr></tbody></table>
      </div>
    </div>

    <div id="rp-section" class="section">
      <h2>Relief Pitcher</h2>
      <div class="table-wrap">
        <table class="data" id="rp-table"><tbody><tr><td class="loader">Loading…</td></tr></tbody></table>
      </div>
    </div>
  </main>

  <script src="/web/assets/shared.js"></script>
  <script src="/web/assets/yesterday.js"></script>
</body>
</html>
